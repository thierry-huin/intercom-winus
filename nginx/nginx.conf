server {
    listen 80;
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Frontend static files
    root /usr/share/nginx/html;
    index index.html;

    # No cache for main entry points
    location ~* \.(html|js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # Certificate download (for iOS trust installation)
    location /cert.pem {
        alias /etc/nginx/certs/cert.pem;
        add_header Content-Type application/x-pem-file;
    }

    # APK download (persistent, survives flutter clean)
    location /intercom.apk {
        alias /usr/share/nginx/downloads/intercom.apk;
        add_header Content-Disposition 'attachment; filename="intercom.apk"';
    }

    # AAB download (Android App Bundle for Play Store uploads).
    # Same downloads/ mount as the APK — build-apps.sh emits the file with
    # the exact name Play Console expects, so we serve it 1:1 without a
    # forced filename header.
    location /winus_intercom.aab {
        alias /usr/share/nginx/downloads/winus_intercom.aab;
        default_type application/octet-stream;
        add_header Content-Disposition 'attachment; filename="winus_intercom.aab"';
    }

    # Privacy policy (linked from Play Store + App Store listings).
    # Both /privacy and /privacy.html serve the same static page.
    location = /privacy {
        alias /etc/nginx/privacy.html;
        add_header Content-Type text/html;
        add_header Cache-Control "public, max-age=300";
    }
    location = /privacy.html {
        alias /etc/nginx/privacy.html;
        add_header Content-Type text/html;
        add_header Cache-Control "public, max-age=300";
    }

    # Backend REST API
    location /api/ {
        proxy_pass http://host.docker.internal:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Backend WebSocket (signaling)
    location /ws {
        proxy_pass http://host.docker.internal:3000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

}
