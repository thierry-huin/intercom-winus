# Coturn TURN server configuration for Intercom
listening-port=3478
fingerprint
lt-cred-mech
realm=intercom
server-name=intercom

# Relay port range (inside container)
min-port=49152
max-port=49200

# Logging
log-file=stdout
verbose

# Allocation lifetime
max-allocate-lifetime=3600
user-quota=100
total-quota=300

# No TLS for now (TURN over plain UDP/TCP)
no-tls
no-dtls

# Disable CLI
no-cli
