services:
  backend:
    container_name: intercom-backend
    network_mode: ""
    networks:
      - intercom-net
    ports:
      - "10000-10200:10000-10200/udp"

  coturn:
    container_name: intercom-coturn
    network_mode: ""
    networks:
      - intercom-net
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49152-49200:49152-49200/udp"

  nginx:
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  intercom-net:
    driver: bridge
